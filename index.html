<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc_1</title>
    <style>
        /* Base Theme */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0d0d0d;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Screen Layouts */
        #screen-1, #screen-2 {
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* Screen 1 specific: Centered Menu */
        #screen-1 {
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .main-btn {
            background-color: transparent;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            width: 400px;
        }

        .main-btn:hover {
            background-color: #39ff14;
            color: #000;
        }

        /* Screen 2 specific: Terminal Interface */
        #screen-2 {
            display: none;
            flex-direction: column;
        }

        /* Terminal Header with Back Button */
        .terminal-header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px dashed #39ff14;
            background-color: #050505;
        }

        .back-btn {
            background-color: transparent;
            color: #39ff14;
            border: 1px solid #39ff14;
            padding: 5px 15px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 20px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background-color: #ff3333; /* Red hover for exiting */
            color: #fff;
            border-color: #ff3333;
        }

        #mode-title {
            font-weight: bold;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid #39ff14;
            background-color: #0d0d0d;
        }

        #math-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #39ff14;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
        }

        #math-input::placeholder {
            color: rgba(57, 255, 20, 0.5);
        }

        .message-row {
            display: flex;
            width: 100%;
            justify-content: flex-start;
        }

        .message {
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .error-text {
            color: #ff3333;
            font-weight: bold;
        }

        .highlight-text {
            color: #fff;
            font-weight: bold;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #39ff14;
            color: #000;
        }

        .separator {
            color: #39ff14;
            opacity: 0.6;
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="screen-1">
        <button class="main-btn" onclick="openCalculator('factor_a1', 'Factoring Trinomials (a=1)')">Factoring Trinomials (a=1)</button>
        <button class="main-btn" onclick="openCalculator('factor_agt1', 'Factoring Trinomials (a>1)')">Factoring Trinomials (a>1)</button>
        <button class="main-btn" onclick="openCalculator('solve_a1', 'Solve by Trinomial Factor (a=1)')">Solve by Trinomial Factor (a=1)</button>
    </div>

    <div id="screen-2">
        <div class="terminal-header">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <div id="mode-title">Mode initialized...</div>
        </div>
        <div class="chat-container" id="chat-box">
            </div>
        <div class="input-container">
            <input type="text" id="math-input" placeholder="Paste or type expression here... and press Enter" autocomplete="off">
        </div>
    </div>

    <script>
        let currentMode = '';

        // UI Navigation
        function openCalculator(mode, modeName) {
            currentMode = mode;
            document.getElementById('screen-1').style.display = 'none';
            document.getElementById('screen-2').style.display = 'flex';
            document.getElementById('mode-title').innerText = `MODE: ${modeName}`;
            document.getElementById('math-input').focus();
        }

        function goBack() {
            document.getElementById('screen-2').style.display = 'none';
            document.getElementById('screen-1').style.display = 'flex';
            document.getElementById('chat-box').innerHTML = ''; // Clear chat history on back
            document.getElementById('math-input').value = '';
        }

        // Input Handling
        const inputField = document.getElementById('math-input');
        const chatBox = document.getElementById('chat-box');

        inputField.addEventListener('input', function() {
            this.value = this.value.replace(/\^2/g, '²');
        });

        inputField.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const query = this.value.trim();
                if (query === '') return;
                
                this.value = '';
                processQuery(query);
            }
        });

        function processQuery(query) {
            appendMessage(`User: ${query}`);
            appendMessage(`System: Thinking...`);

            setTimeout(() => {
                const result = processMathUniversal(query, currentMode);
                
                const sysContainer = document.createElement('div');
                sysContainer.className = 'message-row';
                const sysMsg = document.createElement('div');
                sysMsg.className = 'message';

                if (result.isError) {
                    const randNum = Math.floor(Math.random() * (500 - 50 + 1)) + 50;
                    sysMsg.innerHTML = `System: (<span class="error-text">Error ${randNum}:</span> Math Parsing Failed) Ensure the format matches the current mode.`;
                } else {
                    sysMsg.innerHTML = `System:<br>${result.displayHTML} <button class="copy-btn" onclick="copyResult(this, '${result.copyText}')">📋 Copy Answer</button>`;
                }
                
                sysContainer.appendChild(sysMsg);
                chatBox.appendChild(sysContainer);
                
                const separatorRow = document.createElement('div');
                separatorRow.className = 'message-row';
                const separator = document.createElement('div');
                separator.className = 'separator';
                separator.innerText = '~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~';
                separatorRow.appendChild(separator);
                chatBox.appendChild(separatorRow);

                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        function appendMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row';
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerText = text;
            row.appendChild(msg);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function copyResult(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 2000);
            });
        }

        // --- NEW ALGEBRAIC MATH ENGINE ---

        // Helper: Parses a single side of an equation into a, b, c variables
        function parsePolynomialSide(str) {
            let a = 0, b = 0, c = 0;
            // Add leading + for easier regex matching if no sign is present
            if (!str.startsWith('-') && !str.startsWith('+')) str = '+' + str;
            
            // Match terms like +x^2, -5x, +10
            const termRegex = /([+-]\d*x\^2|[+-]\d*x(?!\^2)|[+-]\d+)/g;
            let matches = str.match(termRegex);
            
            if (matches) {
                matches.forEach(term => {
                    if (term.includes('x^2')) {
                        let val = term.replace('x^2', '');
                        a += (val === '+' || val === '') ? 1 : (val === '-' ? -1 : parseInt(val));
                    } else if (term.includes('x')) {
                        let val = term.replace('x', '');
                        b += (val === '+' || val === '') ? 1 : (val === '-' ? -1 : parseInt(val));
                    } else {
                        c += parseInt(term);
                    }
                });
            }
            return { a, b, c };
        }

        // Master Math Processor
        function processMathUniversal(input, mode) {
            try {
                // 1. Clean the string
                let expr = input.replace(/\s+/g, '').replace(/²/g, '^2').replace(/[−–—]/g, '-').replace(/x2/g, 'x^2');

                // 2. Split by '=' to handle equations
                let parts = expr.split('=');
                
                // 3. Parse Left Side
                let lhs = parsePolynomialSide(parts[0]);
                let a = lhs.a, b = lhs.b, c = lhs.c;

                // 4. Parse Right Side and algebraically move it to the left side (subtract it)
                if (parts.length > 1) {
                    let rhs = parsePolynomialSide(parts[1]);
                    a -= rhs.a;
                    b -= rhs.b;
                    c -= rhs.c;
                }

                // Verify rules based on mode
                if (mode === 'factor_a1' || mode === 'solve_a1') {
                    if (a !== 1) return { isError: true };
                }
                if (a === 0) return { isError: true }; // Not a quadratic

                // 5. Factoring Math (AC Method)
                const gcd = (x, y) => {
                    x = Math.abs(x); y = Math.abs(y);
                    while(y) { let t = y; y = x % y; x = t; }
                    return x;
                };

                let g = gcd(a, gcd(b, c));
                if (a < 0) g = -g; 
                
                let a1 = a / g, b1 = b / g, c1 = c / g;
                let targetMult = a1 * c1, targetAdd = b1;
                let f1 = null, f2 = null;

                if (targetMult === 0) {
                    f1 = targetAdd; f2 = 0;
                } else {
                    let limit = Math.abs(targetMult);
                    for (let i = -limit; i <= limit; i++) {
                        if (i === 0) continue;
                        if (targetMult % i === 0) {
                            let j = targetMult / i;
                            if (i + j === targetAdd) {
                                f1 = i; f2 = j; break;
                            }
                        }
                    }
                }

                if (f1 === null) return { isError: true };

                let gcd1 = gcd(a1, f1);
                let t1_a = a1 / gcd1, t1_c = f1 / gcd1;

                let gcd2 = gcd(a1, f2);
                let t2_a = a1 / gcd2, t2_c = f2 / gcd2;

                const formatBin = (coef, cnst) => {
                    if (coef === 0 && cnst === 0) return '';
                    let xT = coef === 1 ? 'x' : (coef === -1 ? '-x' : `${coef}x`);
                    if (coef === 0) xT = '';
                    if (cnst === 0) return xT;
                    if (coef === 0) return cnst.toString();
                    let cT = cnst > 0 ? `+ ${cnst}` : `- ${Math.abs(cnst)}`;
                    return `(${xT} ${cT})`;
                };

                let b1Str = formatBin(t1_a, t1_c);
                let b2Str = formatBin(t2_a, t2_c);
                
                if (t1_a === 1 && t1_c === 0) b1Str = 'x';
                if (t2_a === 1 && t2_c === 0) b2Str = 'x';
                
                if (b1Str.startsWith('(') && !b2Str.startsWith('(')) {
                    let temp = b1Str; b1Str = b2Str; b2Str = temp;
                }

                let gStr = g === 1 ? '' : (g === -1 ? '-' : g.toString());
                let factoredForm = `${gStr}${b1Str}${b2Str}`;

                // 6. Output Formatting Based on Mode
                if (mode.startsWith('solve')) {
                    // Extract exact mathematical solutions
                    let root1 = (-b + Math.sqrt(b*b - 4*a*c)) / (2*a);
                    let root2 = (-b - Math.sqrt(b*b - 4*a*c)) / (2*a);
                    
                    let solutions = (root1 === root2) ? `${root1}` : `${root1}, ${root2}`;
                    
                    return { 
                        isError: false, 
                        displayHTML: `Factored: ${factoredForm} = 0<br>Solutions: <span class="highlight-text">x = ${solutions}</span>`, 
                        copyText: solutions 
                    };
                } else {
                    return { 
                        isError: false, 
                        displayHTML: `<span class="highlight-text">${factoredForm}</span>`, 
                        copyText: factoredForm.replace(/\\/g, '\\\\') 
                    };
                }
                
            } catch(e) {
                return { isError: true };
            }
        }
    </script>
</body>
</html>
