<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc_1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-1">
        <button class="main-btn" onclick="openCalculator('factor_a1', 'Factoring Trinomials (a=1)')">Factoring Trinomials (a=1)</button>
        <button class="main-btn" onclick="openCalculator('factor_agt1', 'Factoring Trinomials (a>1)')">Factoring Trinomials (a>1)</button>
        <button class="main-btn" onclick="openCalculator('solve_a1', 'Solve by Trinomial Factor (a=1)')">Solve by Trinomial Factor (a=1)</button>
        <button class="main-btn" onclick="openCalculator('solve_agt1', 'Solve by Trinomial Factor (a>1)')">Solve by Trinomial Factor (a>1)</button>
        <button class="main-btn" onclick="openCalculator('elimination', 'Elimination (Level 3)')">Elimination (Level 3)</button>
        <button class="main-btn" onclick="openCalculator('substitution', 'Substitution (Level 3)')">Substitution (Level 3)</button>
        <button class="main-btn" onclick="openCalculator('distribute', 'Linear Equations w/ Distribution (Level 3)')">Linear Equations w/ Distribution (Level 3)</button>
    </div>

    <div id="screen-2">
        <div class="terminal-header">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <div id="mode-title">Mode initialized...</div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="math-input" placeholder="Paste or type here... and press Enter" autocomplete="off">
        </div>
    </div>

    <script src="math.js"></script>
</body>
</html>
