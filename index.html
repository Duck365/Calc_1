<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc_1</title>
    <style>
        /* Base Theme */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0d0d0d; /* Deep Black */
            color: #39ff14; /* Neon Green */
            font-family: 'Courier New', Courier, monospace; /* Coding font */
            overflow: hidden;
        }

        /* Screen Layouts */
        #screen-1, #screen-2 {
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* Screen 1 specific: Centered Menu */
        #screen-1 {
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px; /* Space between the buttons */
        }

        .main-btn {
            background-color: transparent;
            color: #39ff14;
            border: 2px solid #39ff14;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            width: 350px;
        }

        .main-btn:hover {
            background-color: #39ff14;
            color: #000;
        }

        /* Screen 2 specific: Terminal Interface */
        #screen-2 {
            display: none; /* Hidden initially */
            flex-direction: column;
        }

        .chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Tighter gap for terminal feel */
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid #39ff14;
            background-color: #0d0d0d;
        }

        #math-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #39ff14;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
        }

        #math-input::placeholder {
            color: rgba(57, 255, 20, 0.5);
        }

        /* Message Styling - All Left Aligned */
        .message-row {
            display: flex;
            width: 100%;
            justify-content: flex-start;
        }

        .message {
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.5;
        }

        /* Error Styling */
        .error-text {
            color: #ff3333; /* Red color for errors */
            font-weight: bold;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #39ff14;
            color: #000;
        }

        .separator {
            color: #39ff14;
            opacity: 0.6;
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .mode-indicator {
            color: #39ff14;
            opacity: 0.8;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 1px dashed #39ff14;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="screen-1">
        <button class="main-btn" onclick="openCalculator('a=1')">Factoring Trinomials (a=1)</button>
        <button class="main-btn" onclick="openCalculator('a>1')">Factoring Trinomials (a>1)</button>
    </div>

    <div id="screen-2">
        <div class="chat-container" id="chat-box">
            </div>
        <div class="input-container">
            <input type="text" id="math-input" placeholder="Paste or type expression here... and press Enter" autocomplete="off">
        </div>
    </div>

    <script>
        let currentMode = '';

        // Switch from Screen 1 to Screen 2
        function openCalculator(mode) {
            currentMode = mode;
            document.getElementById('screen-1').style.display = 'none';
            document.getElementById('screen-2').style.display = 'flex';
            
            // Add a header to the terminal so we know what mode we are in
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = `<div class="mode-indicator">Mode initialized: Factoring Trinomials (${mode})</div>`;
            
            document.getElementById('math-input').focus();
        }

        const inputField = document.getElementById('math-input');
        const chatBox = document.getElementById('chat-box');

        // Automatically format typed ^2 to ²
        inputField.addEventListener('input', function() {
            this.value = this.value.replace(/\^2/g, '²');
        });

        // Listen for the Enter key
        inputField.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const query = this.value.trim();
                if (query === '') return;
                
                this.value = ''; // clear box
                processQuery(query);
            }
        });

        function processQuery(query) {
            appendMessage(`User: ${query}`);
            appendMessage(`System: Thinking...`);

            setTimeout(() => {
                const result = factorTrinomialUniversal(query, currentMode);
                
                const sysContainer = document.createElement('div');
                sysContainer.className = 'message-row';
                const sysMsg = document.createElement('div');
                sysMsg.className = 'message';

                if (result.isError) {
                    const randNum = Math.floor(Math.random() * (500 - 50 + 1)) + 50;
                    sysMsg.innerHTML = `System: (<span class="error-text">Error ${randNum}:</span> Invalid Expression) Please type or paste a valid expression.`;
                } else {
                    sysMsg.innerHTML = `System: ${result.answer} <button class="copy-btn" onclick="copyResult(this, '${result.answer.replace(/\\/g, '\\\\')}')">📋 Copy</button>`;
                }
                
                sysContainer.appendChild(sysMsg);
                chatBox.appendChild(sysContainer);
                
                // Add separator line
                const separatorRow = document.createElement('div');
                separatorRow.className = 'message-row';
                const separator = document.createElement('div');
                separator.className = 'separator';
                separator.innerText = '~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~';
                separatorRow.appendChild(separator);
                chatBox.appendChild(separatorRow);

                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        function appendMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row';
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerText = text;
            row.appendChild(msg);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Copy logic
        function copyResult(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 2000);
            });
        }

        // Universal Factoring Logic (Handles a=1 and a>1 utilizing the AC Method)
        function factorTrinomialUniversal(input, mode) {
            try {
                // 1. Clean up the string (handles new lines, special minus signs, and drops the 2 down to ^2)
                let expr = input.replace(/\s+/g, '').replace('²', '^2');
                expr = expr.replace(/[−–—]/g, '-');
                expr = expr.replace(/x2/g, 'x^2'); // Turns 6x2 into 6x^2

                // Extract 'a'
                let aMatch = expr.match(/^([+-]?\d*)x\^2/);
                if (!aMatch) return { isError: true };
                
                let aStr = aMatch[1];
                let a = 1;
                if (aStr === '-') a = -1;
                else if (aStr !== '' && aStr !== '+') a = parseInt(aStr);

                // Enforce mode rules
                if (mode === 'a=1' && Math.abs(a) !== 1) return { isError: true };

                expr = expr.substring(aMatch[0].length);

                // Extract 'b'
                let bMatch = expr.match(/^([+-]?\d*)x/);
                let b = 0;
                if (bMatch) {
                    let bStr = bMatch[1];
                    if (bStr === '+' || bStr === '') b = 1;
                    else if (bStr === '-') b = -1;
                    else b = parseInt(bStr);
                    expr = expr.substring(bMatch[0].length);
                }

                // Extract 'c'
                let c = 0;
                if (expr.length > 0) {
                    c = parseInt(expr);
                }
                if (isNaN(c)) return { isError: true };

                // Greatest Common Divisor Helper
                const gcd = (x, y) => {
                    x = Math.abs(x); y = Math.abs(y);
                    while(y) { let t = y; y = x % y; x = t; }
                    return x;
                };

                // Pull out the Greatest Common Factor of the whole trinomial
                let g = gcd(a, gcd(b, c));
                if (a < 0) g = -g; 
                
                let a1 = a / g;
                let b1 = b / g;
                let c1 = c / g;

                // AC Method setup
                let targetMult = a1 * c1;
                let targetAdd = b1;
                let f1 = null, f2 = null;

                if (targetMult === 0) {
                    f1 = targetAdd;
                    f2 = 0;
                } else {
                    let limit = Math.abs(targetMult);
                    for (let i = -limit; i <= limit; i++) {
                        if (i === 0) continue;
                        if (targetMult % i === 0) {
                            let j = targetMult / i;
                            if (i + j === targetAdd) {
                                f1 = i; f2 = j; break;
                            }
                        }
                    }
                }

                // If no factors are found, it's prime
                if (f1 === null) return { isError: true };

                // Divide binomials by their internal GCFs to simplify
                let gcd1 = gcd(a1, f1);
                let t1_a = a1 / gcd1;
                let t1_c = f1 / gcd1;

                let gcd2 = gcd(a1, f2);
                let t2_a = a1 / gcd2;
                let t2_c = f2 / gcd2;

                // Formatting function for binomials
                const formatBin = (coef, cnst) => {
                    if (coef === 0 && cnst === 0) return '';
                    let xT = coef === 1 ? 'x' : (coef === -1 ? '-x' : `${coef}x`);
                    if (coef === 0) xT = '';
                    if (cnst === 0) return xT;
                    if (coef === 0) return cnst.toString();
                    let cT = cnst > 0 ? `+ ${cnst}` : `- ${Math.abs(cnst)}`;
                    return `(${xT} ${cT})`;
                };

                let b1Str = formatBin(t1_a, t1_c);
                let b2Str = formatBin(t2_a, t2_c);
                
                // Clean up single X terms without parentheses
                if (t1_a === 1 && t1_c === 0) b1Str = 'x';
                if (t2_a === 1 && t2_c === 0) b2Str = 'x';
                if (t1_a !== 1 && t1_c === 0) b1Str = `${t1_a}x`;
                if (t2_a !== 1 && t2_c === 0) b2Str = `${t2_a}x`;

                // Arrange so standalone terms sit on the left (e.g. x(x-4) instead of (x-4)x )
                if (b1Str.startsWith('(') && !b2Str.startsWith('(')) {
                    let temp = b1Str; b1Str = b2Str; b2Str = temp;
                }

                let gStr = g === 1 ? '' : (g === -1 ? '-' : g.toString());

                return { isError: false, answer: `${gStr}${b1Str}${b2Str}` };
                
            } catch(e) {
                return { isError: true };
            }
        }
    </script>
</body>
</html>
